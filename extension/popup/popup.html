<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Post Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>LinkedIn Post Gen</h1>
      <div id="usage-badge" class="usage-badge">3/3 left</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-mode="post">New post</button>
      <button class="tab" data-mode="reply">Smart reply</button>
    </div>

    <div id="post-mode" class="mode-panel active">
      <label for="topic">What do you want to post about?</label>
      <textarea id="topic" placeholder="e.g. Why most people overthink their first startup..." rows="3"></textarea>
      <div class="row">
        <div class="field">
          <label for="tone">Tone</label>
          <select id="tone">
            <option value="thought-leader">Thought leader</option>
            <option value="casual">Casual</option>
            <option value="storytelling">Storytelling</option>
            <option value="contrarian">Contrarian</option>
            <option value="educational">Educational</option>
            <option value="motivational">Motivational</option>
          </select>
        </div>
        <div class="field">
          <label for="length">Length</label>
          <select id="length">
            <option value="short">Short (~50 words)</option>
            <option value="medium" selected>Medium (~120 words)</option>
            <option value="long">Long (~200 words)</option>
          </select>
        </div>
      </div>
      <button id="generate-post-btn" class="btn-primary">Generate post</button>
    </div>

    <div id="reply-mode" class="mode-panel">
      <label for="original-post">Paste the post you're replying to</label>
      <textarea id="original-post" placeholder="Paste the LinkedIn post text here..." rows="3"></textarea>
      <label for="reply-angle">Your angle (optional)</label>
      <input type="text" id="reply-angle" placeholder="e.g. agree but add nuance, disagree respectfully...">
      <div class="row">
        <div class="field">
          <label for="reply-tone">Tone</label>
          <select id="reply-tone">
            <option value="supportive">Supportive</option>
            <option value="add-value">Add value</option>
            <option value="respectful-disagree">Respectful disagree</option>
            <option value="curious">Curious / ask questions</option>
            <option value="witty">Witty</option>
          </select>
        </div>
      </div>
      <button id="generate-reply-btn" class="btn-primary">Generate reply</button>
    </div>

    <div id="output-area" class="output-area hidden">
      <div class="output-header">
        <span class="output-label">Your draft</span>
        <div class="output-actions">
          <button id="copy-btn" class="btn-icon" title="Copy to clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <button id="regen-btn" class="btn-icon" title="Regenerate">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="output-text" class="output-text"></div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Writing your draft...</span>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="upgrade-prompt" class="upgrade-prompt hidden">
      <p>You've used all 3 free generations today.</p>
      <button id="upgrade-btn" class="btn-upgrade">Upgrade to Pro — $7.99/mo</button>
      <span class="upgrade-sub">Unlimited posts & replies</span>
    </div>

    <div class="footer">
      <span id="plan-label" class="plan-label">Free plan</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
